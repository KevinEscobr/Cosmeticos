services:
  # PHP-FPM Application Service
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: cosmetics-app:latest
    container_name: cosmetics-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - cosmetics-network

  # Nginx Web Server Service
  webserver:
    image: nginx:alpine
    container_name: cosmetics-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cosmetics-network
    depends_on:
      - app

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: cosmetics-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: cosmetics_db
      MYSQL_USER: cosmetics_user
      MYSQL_PASSWORD: cosmetics_pass
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - cosmetics-network

networks:
  cosmetics-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
